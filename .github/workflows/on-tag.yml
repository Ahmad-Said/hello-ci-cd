name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run tests
        run: pytest

      - name: Package Application
        run: |
          echo "Packaging..."
          mkdir -p dist
          zip -r dist/app-${{ github.ref_name }}.zip src/
          
      - name: Create Release Placeholder
        run: echo "Creating GitHub Release for ${{ github.ref_name }} (Simulated in local act)"
