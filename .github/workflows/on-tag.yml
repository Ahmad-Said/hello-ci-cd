name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          APP_ENV: ${{ secrets.APP_ENV }}
        run: |
          echo "Running tests in environment: $APP_ENV"
          pytest

      - name: Package Application
        run: |
          echo "Packaging..."
          mkdir -p dist
          zip dist/app-${{ github.ref_name }}.zip math_ops.py

      - name: Create Release
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          echo "Creating GitHub Release for ${{ github.ref_name }}"
          echo "Authenticating with release token: ${RELEASE_TOKEN:0:4}****"
          echo "Release published."
